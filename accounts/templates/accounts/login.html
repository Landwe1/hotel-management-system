<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System - Login</title>
    <style>
        /* Ensures Django form fields look styled */
        input[type="text"], input[type="password"], input[type="tel"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
    </style>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div style="background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
        <h2 style="text-align: center; color: #2c3e50; margin-bottom: 10px;">Grand Hotel Management</h2>
        <p style="text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 30px;">Sign in to access your work desk</p>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            {% if form.errors %}
                <div style="background-color: #fde8e8; color: #e74c3c; padding: 10px; border-radius: 4px; font-size: 14px; margin-bottom: 15px;">
                    Invalid phone number or password. Please try again.
                </div>
            {% endif %}

            <div style="margin-bottom: 15px;">
                <label style="font-weight: 600; color: #34495e; font-size: 14px;">Phone Number</label>
                {{ form.username }}
            </div>

            <div style="margin-bottom: 25px;">
                <label style="font-weight: 600; color: #34495e; font-size: 14px;">Password</label>
                {{ form.password }}
            </div>

            <button type="submit" style="width: 100%; background-color: #3498db; color: white; padding: 14px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
                Login to System
            </button>
        </form>
    </div>

</body>
</html>
