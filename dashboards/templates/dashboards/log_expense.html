<!DOCTYPE html>
<html>
<head>
    <title>Log Operational Expense</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #f4f6f9; 
            margin: 0; 
            padding: 20px; 
            color: #333;
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .header-section h1 { margin: 0; color: #2c3e50; }
        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #34495e;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }
        .form-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
            color: #2c3e50;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:hover { background: #a93226; }
    </style>
</head>
<body>

    <div class="header-section" style="max-width: 600px; margin: 0 auto 20px auto;">
        <h1>Log Expense</h1>
        <a href="{% url 'dashboards:accountant_home' %}" class="btn">Back to Accounts</a>
    </div>

    <div class="form-card">
        {% if messages %}
            {% for message in messages %}
                <div style="padding: 12px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; 
                    {% if message.tags == 'error' %} background: #fdedec; color: #e74c3c; {% else %} background: #eafaf1; color: #2ecc71; {% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">Expense Description / Title *</label>
                <input type="text" id="title" name="title" class="form-control" placeholder="e.g., Generator Diesel Fuel Purchase" required>
            </div>

            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" name="category" class="form-control" required>
                    <option value="">-- Select Expense Category --</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="amount">Amount (ZMK) *</label>
                <input type="number" step="0.01" id="amount" name="amount" class="form-control" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label for="vendor_supplier">Vendor / Supplier</label>
                <input type="text" id="vendor_supplier" name="vendor_supplier" class="form-control" placeholder="e.g., TotalEnergies Zambia">
            </div>

            <div class="form-group">
                <label for="expense_date">Expense Date *</label>
                <input type="date" id="expense_date" name="expense_date" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="receipt_doc">Upload Receipt Document (Optional)</label>
                <input type="file" id="receipt_doc" name="receipt_doc" class="form-control" accept="image/*,.pdf">
            </div>

            <button type="submit" class="btn-submit">Record Expense</button>
        </form>
    </div>

    <script>
        // Default expense date to today
        document.getElementById('expense_date').valueAsDate = new Date();
    </script>

</body>
</html>
