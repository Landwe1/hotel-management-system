<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts Terminal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 800px; margin: 20px auto; }
        .metric { background: #e8f5e9; color: #1b5e20; padding: 20px; border-radius: 6px; font-size: 24px; font-weight: bold; margin: 20px 0; border-left: 5px solid #2ecc71; }
        .btn-back { display: inline-block; background: #2c3e50; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>💰 Financial Ledger Control Panel</h1>
        <p>Logged in user: <strong>{{ request.user.phone_number }}</strong></p>

        <div class="metric">
            Total Realized Income: K0.00
        </div>

        <h3>Unpaid Invoices / Incomplete Accounts</h3>
        <p style="color: #666; font-style: italic;">All books clear! No pending system payments detected.</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
        
        <a href="{% url 'manager_home' %}" class="btn-back">⬅️ Return to Executive Panel</a>
    </div>

</body>
</html>
